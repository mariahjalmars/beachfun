<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,700;1,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ocean-deep: #0a2342;
    --ocean-mid: #1a4a7a;
    --ocean-light: #2d7dd2;
    --sand: #f5e6c8;
    --sand-dark: #e8d5a8;
    --foam: #e8f4f8;
    --go-green: #2ecc71;
    --caution-amber: #f39c12;
    --no-red: #e74c3c;
    --text-light: #f0f4f8;
    --text-muted: rgba(240,244,248,0.6);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--ocean-deep);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated ocean background */
  .ocean-bg {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #060f1e 0%, #0a2342 40%, #0d3060 70%, #1a4a7a 100%);
    z-index: 0;
  }

  .stars {
    position: fixed;
    inset: 0;
    z-index: 1;
    overflow: hidden;
  }

  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.2; }
    to { opacity: 0.9; }
  }

  /* Wave layers */
  .waves {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 200px;
    z-index: 2;
    pointer-events: none;
  }

  .wave {
    position: absolute;
    bottom: 0;
    width: 200%;
    height: 100%;
    animation: waveScroll linear infinite;
  }

  .wave svg { width: 100%; height: 100%; }

  .wave1 { animation-duration: 8s; opacity: 0.5; }
  .wave2 { animation-duration: 12s; opacity: 0.3; animation-direction: reverse; bottom: 10px; }
  .wave3 { animation-duration: 6s; opacity: 0.2; bottom: 20px; }

  @keyframes waveScroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* Main container */
  .container {
    position: relative;
    z-index: 10;
    max-width: 420px;
    margin: 0 auto;
    padding: 24px 20px 160px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 32px 0 24px;
  }

  .paw-icon {
    font-size: 2.4rem;
    display: block;
    margin-bottom: 8px;
    animation: wag 2s ease-in-out infinite;
  }

  @keyframes wag {
    0%, 100% { transform: rotate(-10deg); }
    50% { transform: rotate(10deg); }
  }

  .header h1 {
    font-family: 'Fraunces', serif;
    font-size: 2rem;
    color: var(--text-light);
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .header h1 span {
    color: var(--sand);
  }

  .header .subtitle {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  /* Main verdict card */
  .verdict-card {
    border-radius: 28px;
    padding: 32px 28px;
    margin: 8px 0 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: all 0.6s ease;
    cursor: default;
  }

  .verdict-card.go {
    background: linear-gradient(135deg, #1a6b3c 0%, #27ae60 60%, #2ecc71 100%);
    box-shadow: 0 20px 60px rgba(46,204,113,0.3), 0 4px 20px rgba(0,0,0,0.3);
  }

  .verdict-card.caution {
    background: linear-gradient(135deg, #7d5005 0%, #d68910 60%, #f39c12 100%);
    box-shadow: 0 20px 60px rgba(243,156,18,0.3), 0 4px 20px rgba(0,0,0,0.3);
  }

  .verdict-card.no {
    background: linear-gradient(135deg, #7b1a1a 0%, #c0392b 60%, #e74c3c 100%);
    box-shadow: 0 20px 60px rgba(231,76,60,0.3), 0 4px 20px rgba(0,0,0,0.3);
  }

  .verdict-card.loading {
    background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 100%);
    box-shadow: 0 20px 60px rgba(45,125,210,0.2), 0 4px 20px rgba(0,0,0,0.3);
  }

  .verdict-shimmer {
    position: absolute;
    top: -50%;
    left: -60%;
    width: 40%;
    height: 200%;
    background: rgba(255,255,255,0.1);
    transform: skewX(-20deg);
    animation: shimmer 3s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { left: -60%; }
    50% { left: 120%; }
  }

  .verdict-emoji {
    font-size: 4rem;
    display: block;
    margin-bottom: 12px;
    animation: bounce 1s ease-in-out infinite alternate;
  }

  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-8px); }
  }

  .verdict-title {
    font-family: 'Fraunces', serif;
    font-size: 2.2rem;
    font-weight: 700;
    color: white;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .verdict-desc {
    color: rgba(255,255,255,0.85);
    font-size: 0.95rem;
    line-height: 1.5;
    max-width: 280px;
    margin: 0 auto;
  }

  /* Tide meter */
  .tide-meter-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
    backdrop-filter: blur(10px);
  }

  .meter-label {
    color: var(--text-muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }

  .tide-bar-wrap {
    background: rgba(0,0,0,0.3);
    border-radius: 20px;
    height: 14px;
    overflow: hidden;
    position: relative;
  }

  .tide-bar-fill {
    height: 100%;
    border-radius: 20px;
    background: linear-gradient(90deg, #2d7dd2, #56b4e9);
    transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
    position: relative;
  }

  .tide-bar-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    width: 20px;
    height: 100%;
    background: rgba(255,255,255,0.4);
    border-radius: 0 20px 20px 0;
    animation: glimmer 2s ease-in-out infinite;
  }

  @keyframes glimmer {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  .tide-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
  }

  .tide-labels span {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .tide-height-display {
    text-align: right;
    margin-top: 6px;
  }

  .tide-height-display .height-num {
    font-family: 'Fraunces', serif;
    font-size: 2rem;
    font-weight: 300;
    color: var(--sand);
    line-height: 1;
  }

  .tide-height-display .height-unit {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-left: 3px;
  }

  .tide-direction {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    justify-content: flex-end;
  }

  .tide-direction .dir-arrow {
    font-size: 1rem;
    transition: transform 0.3s;
  }

  .tide-direction .dir-text {
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  /* Info grid */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .info-tile {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 16px;
    backdrop-filter: blur(10px);
  }

  .info-tile .tile-icon { font-size: 1.4rem; margin-bottom: 6px; display: block; }
  .info-tile .tile-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 4px; }
  .info-tile .tile-value { font-family: 'Fraunces', serif; font-size: 1.2rem; color: var(--sand); font-weight: 300; }
  .info-tile .tile-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

  /* Timeline */
  .timeline-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
    backdrop-filter: blur(10px);
  }

  .timeline-title {
    color: var(--text-muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 16px;
  }

  .timeline {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .timeline-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 0;
    position: relative;
  }

  .timeline-item:not(:last-child)::after {
    content: '';
    position: absolute;
    left: 18px;
    top: 38px;
    bottom: -10px;
    width: 2px;
    background: rgba(255,255,255,0.1);
  }

  .timeline-dot {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .timeline-dot.high { background: rgba(45,125,210,0.3); border: 2px solid #2d7dd2; }
  .timeline-dot.low { background: rgba(86,180,233,0.15); border: 2px solid rgba(86,180,233,0.4); }
  .timeline-dot.current { background: rgba(243,156,18,0.3); border: 2px solid #f39c12; box-shadow: 0 0 12px rgba(243,156,18,0.4); }

  .timeline-info { flex: 1; }
  .timeline-info .t-time { font-family: 'Fraunces', serif; font-size: 1.1rem; color: var(--sand); font-weight: 300; }
  .timeline-info .t-label { font-size: 0.75rem; color: var(--text-muted); }

  .timeline-info .t-beach {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 20px;
    margin-top: 3px;
    display: inline-block;
  }

  .t-beach.go-badge { background: rgba(46,204,113,0.2); color: #2ecc71; }
  .t-beach.caution-badge { background: rgba(243,156,18,0.2); color: #f39c12; }
  .t-beach.no-badge { background: rgba(231,76,60,0.2); color: #e74c3c; }

  .timeline-height {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    color: rgba(240,244,248,0.5);
    font-weight: 300;
  }

  /* Refresh button */
  .refresh-btn {
    width: 100%;
    padding: 16px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: var(--text-light);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .refresh-btn:hover {
    background: rgba(255,255,255,0.14);
    border-color: rgba(255,255,255,0.3);
  }

  .refresh-btn:active { transform: scale(0.98); }

  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Location badge */
  .location-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: var(--text-muted);
    font-size: 0.78rem;
    margin-top: 8px;
    margin-bottom: 20px;
  }

  /* Error state */
  .error-msg {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.85rem;
    padding: 12px;
  }

  /* Loading pulse */
  .loading-pulse {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 20px 0;
  }

  .loading-pulse span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    animation: pulse 1.2s ease-in-out infinite;
  }

  .loading-pulse span:nth-child(2) { animation-delay: 0.2s; }
  .loading-pulse span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 100% { transform: scale(0.7); opacity: 0.4; }
    50% { transform: scale(1.2); opacity: 1; }
  }

  .last-updated {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.72rem;
    margin-top: 12px;
    margin-bottom: 4px;
  }

  /* Floki photo */
  .floki-photo-wrap {
    position: relative;
    width: 140px;
    height: 140px;
    margin: 0 auto 16px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 0 4px rgba(255,255,255,0.15), 0 8px 32px rgba(0,0,0,0.5);
    transition: box-shadow 0.5s ease;
  }

  .floki-photo-wrap.go-glow {
    box-shadow: 0 0 0 4px rgba(46,204,113,0.6), 0 0 30px rgba(46,204,113,0.4), 0 8px 32px rgba(0,0,0,0.5);
    animation: photoGlow 2s ease-in-out infinite alternate;
  }

  .floki-photo-wrap.caution-glow {
    box-shadow: 0 0 0 4px rgba(243,156,18,0.6), 0 0 30px rgba(243,156,18,0.4), 0 8px 32px rgba(0,0,0,0.5);
  }

  .floki-photo-wrap.no-glow {
    box-shadow: 0 0 0 4px rgba(231,76,60,0.6), 0 0 30px rgba(231,76,60,0.3), 0 8px 32px rgba(0,0,0,0.5);
    filter: grayscale(40%);
  }

  @keyframes photoGlow {
    from { box-shadow: 0 0 0 4px rgba(46,204,113,0.6), 0 0 20px rgba(46,204,113,0.3), 0 8px 32px rgba(0,0,0,0.5); }
    to   { box-shadow: 0 0 0 4px rgba(46,204,113,0.9), 0 0 50px rgba(46,204,113,0.6), 0 8px 32px rgba(0,0,0,0.5); }
  }

  .floki-photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
    transition: filter 0.5s ease;
  }

  .floki-overlay {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    transition: background 0.5s ease;
  }

  .floki-caption {
    position: absolute;
    bottom: 6px;
    right: 6px;
    font-size: 1.4rem;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    transition: all 0.4s ease;
  }


  /* Countdown */
  .countdown-wrap {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .countdown-main {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .countdown-icon {
    font-size: 2.4rem;
    animation: bob 2s ease-in-out infinite alternate;
  }

  @keyframes bob {
    from { transform: translateY(0); }
    to   { transform: translateY(-6px); }
  }

  .countdown-time {
    font-family: 'Fraunces', serif;
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--sand);
    line-height: 1;
    letter-spacing: -1px;
  }

  .countdown-label {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .countdown-after {
    font-size: 0.82rem;
    color: var(--text-muted);
    padding-left: 4px;
  }


  /* Water level visual */
  .water-level-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 4px;
  }

  .water-level-bg {
    flex: 1;
    height: 80px;
    background: rgba(0,0,0,0.25);
    border-radius: 14px;
    overflow: hidden;
    position: relative;
  }

  .water-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    transition: height 1.4s cubic-bezier(0.4,0,0.2,1);
    border-radius: 0 0 14px 14px;
  }

  .water-surface {
    position: absolute;
    top: -18px;
    left: 0;
    width: 100%;
    height: 20px;
  }

  .wave-svg {
    width: 200%;
    height: 100%;
    animation: waveMove 3s linear infinite;
  }

  @keyframes waveMove {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  .water-labels {
    position: absolute;
    top: 0; right: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 6px 8px;
    pointer-events: none;
  }

  .water-label-high, .water-label-low {
    font-size: 0.6rem;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.35);
    font-weight: 600;
  }

  .water-right {
    min-width: 60px;
    text-align: center;
  }

  .water-dir {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    color: var(--sand);
    font-weight: 300;
    white-space: nowrap;
  }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 14px 0;
  }


  /* Notification banner */
  .notif-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 18px 20px;
    margin-bottom: 16px;
    backdrop-filter: blur(10px);
  }

  .notif-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .notif-info { flex: 1; }
  .notif-title {
    font-size: 0.9rem;
    color: var(--text-light);
    font-weight: 500;
    margin-bottom: 3px;
  }
  .notif-sub {
    font-size: 0.75rem;
    color: var(--text-muted);
    line-height: 1.4;
  }

  .notif-toggle {
    position: relative;
    width: 52px;
    height: 28px;
    flex-shrink: 0;
  }

  .notif-toggle input { display: none; }

  .notif-slider {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.15);
    border-radius: 28px;
    cursor: pointer;
    transition: background 0.3s;
  }

  .notif-slider::before {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    left: 3px; top: 3px;
    background: white;
    border-radius: 50%;
    transition: transform 0.3s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }

  .notif-toggle input:checked + .notif-slider {
    background: var(--go-green);
  }

  .notif-toggle input:checked + .notif-slider::before {
    transform: translateX(24px);
  }

  .notif-status {
    font-size: 0.72rem;
    margin-top: 10px;
    padding: 8px 12px;
    border-radius: 10px;
    background: rgba(0,0,0,0.2);
    color: var(--text-muted);
    display: none;
    line-height: 1.5;
  }

  .notif-status.show { display: block; }
  .notif-status.ok { color: var(--go-green); }
  .notif-status.warn { color: var(--caution-amber); }

  /* API status dot */
  .api-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 5px;
    background: var(--text-muted);
  }
  .api-dot.live { background: var(--go-green); animation: blink 2s infinite; }
  .api-dot.fallback { background: var(--caution-amber); }
  @keyframes blink {
    0%,100% { opacity:1; } 50% { opacity:0.3; }
  }

  /* Notification banner */
  .notif-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
    backdrop-filter: blur(10px);
  }

  .notif-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .notif-title {
    color: var(--text-muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .notif-status {
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  .notif-status.granted { background: rgba(46,204,113,0.2); color: #2ecc71; }
  .notif-status.denied  { background: rgba(231,76,60,0.2);  color: #e74c3c; }
  .notif-status.default { background: rgba(255,255,255,0.1); color: var(--text-muted); }

  .notif-body {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .notif-desc {
    font-size: 0.83rem;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .notif-btn {
    width: 100%;
    padding: 13px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #2d7dd2, #1a5fa8);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .notif-btn:hover { filter: brightness(1.15); }
  .notif-btn:active { transform: scale(0.98); }
  .notif-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .notif-times {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 4px;
  }

  .notif-time-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0,0,0,0.2);
    border-radius: 10px;
    padding: 10px 14px;
  }

  .notif-time-label { font-size: 0.82rem; color: var(--text-muted); }
  .notif-time-val { font-family: 'Fraunces', serif; font-size: 1rem; color: var(--sand); font-weight: 300; }

  .notif-ios-tip {
    background: rgba(255,214,0,0.08);
    border: 1px solid rgba(255,214,0,0.2);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 0.78rem;
    color: rgba(255,214,0,0.85);
    line-height: 1.5;
    margin-top: 4px;
  }
</style>
</head>

<script>
// ── Generate stars ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 60 + '%';
  s.style.animationDelay = Math.random() * 3 + 's';
  s.style.animationDuration = (2 + Math.random() * 3) + 's';
  s.style.opacity = Math.random() * 0.6 + 0.1;
  starsEl.appendChild(s);
}

// ── Beach suitability logic ──
// Tide height thresholds (in metres, typical Reykjavik range 0 – ~4m)
// > 2.5m = too high (waves close in, little beach space)
// 1.5 – 2.5m = caution (OK but wet paws)
// < 1.5m = great for Floki!
const TIDE_MAX_REYKJAVIK = 4.0;

function getTideVerdict(heightM, isRising, nextHighH, nextHighMins) {
  // Also factor in if high tide is very soon
  if (heightM > 2.8) {
    return {
      status: 'no',
      emoji: '🚫',
      title: 'Við förum ekki núna - það er flóð!',
      desc: 'Það er háflóð - engin strönd! Ekkert boltakast!'
    };
  }
  if (heightM > 1.8) {
    return {
      status: 'caution',
      emoji: '⚠️',
      title: 'Það er of hættulegt núna, engin strönd!',
      desc: 'Mætti fara en búast má við hundasundi og engu boltakasti!'
    };
  }
  if (isRising && nextHighH > 2.5 && nextHighMins < 90) {
    return {
      status: 'caution',
      emoji: '⏳',
      title: 'Drífa sig núna eða bíða!',
      desc: `Flóðið er að hækka hratt — flóð eftir ${Math.round(nextHighMins)} mín. Farðu núna og vertu stutt, eða bíddu eftir fjöru!`
    };
  }
  return {
    status: 'go',
    emoji: '🐕',
    title: 'Förum!',
    desc: 'Fjara — fullkomið fyrir hlaup, bolta og fjör!'
  };
}

function getBeachBadge(heightM) {
  if (heightM > 2.8) return { cls: 'no-badge', label: 'Háflóð' };
  if (heightM > 1.8) return { cls: 'caution-badge', label: 'Varúð' };
  return { cls: 'go-badge', label: 'Frábært!' };
}

// ── Fetch tide data from tide-forecast.com via Open-Meteo Marine API ──
// We use Open-Meteo's free marine API for sea level data, no key required.
async function fetchTideData() {
  const btn = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  icon.classList.add('spin');
  btn.disabled = true;

  // When opened as a local file, fetch() is blocked — go straight to harmonic
  if (location.protocol === 'file:') {
    simulateTideData();
    icon.classList.remove('spin');
    btn.disabled = false;
    return;
  }

  try {
    const lat = 64.15, lon = -21.93;
    const today = new Date();
    const d1 = today.toISOString().split('T')[0];
    const d2 = new Date(today.getTime() + 86400000).toISOString().split('T')[0];
    const url = `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=sea_level_height_msl&models=smoc&timezone=Atlantic%2FReykjavik&start_date=${d1}&end_date=${d2}`;

    const res = await fetch(url);
    if (!res.ok) throw new Error('API failed: ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.reason || 'API error');

    const times = data.hourly?.time;
    const levels = data.hourly?.sea_level_height_msl;
    if (!times || !levels || levels.every(v => v === null)) throw new Error('No data');

    const tides = [];
    for (let i = 1; i < levels.length - 1; i++) {
      const prev = levels[i-1], cur = levels[i], next = levels[i+1];
      if (cur === null || prev === null || next === null) continue;
      const isHigh = cur > prev && cur > next;
      const isLow  = cur < prev && cur < next;
      if (!isHigh && !isLow) continue;
      const dt = new Date(times[i]);
      if (dt.toDateString() !== today.toDateString()) continue;
      const timeH = dt.getHours() + dt.getMinutes() / 60;
      const timeStr = dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      tides.push({ type: isHigh ? 'high' : 'low', time: timeStr, timeH, heightM: cur });
    }
    if (tides.length < 2) throw new Error('Not enough extremes');

    renderTideData(tides, levels, times);

  } catch(e) {
    simulateTideData();
  }

  icon.classList.remove('spin');
  btn.disabled = false;
}

// Called when live API works — renders using real data
function renderTideData(tides, levels, times) {
  window._dataSource = 'live';
  const now = new Date();
  const h = now.getHours() + now.getMinutes() / 60;

  // Interpolate current height from hourly data
  let currentHeight = null;
  for (let i = 0; i < times.length - 1; i++) {
    const t0 = new Date(times[i]);
    const t1 = new Date(times[i+1]);
    if (now >= t0 && now < t1 && levels[i] !== null && levels[i+1] !== null) {
      const frac = (now - t0) / (t1 - t0);
      currentHeight = levels[i] + (levels[i+1] - levels[i]) * frac;
      break;
    }
  }
  if (currentHeight === null) currentHeight = levels[0] || 1.0;

  const prevH = currentHeight - 0.05; // approximate
  // Check actual trend from hourly data
  let isRising = true;
  for (let i = 1; i < times.length; i++) {
    const t0 = new Date(times[i-1]);
    const t1 = new Date(times[i]);
    if (now >= t0 && now < t1) {
      isRising = (levels[i] || 0) > (levels[i-1] || 0);
      break;
    }
  }

  renderUI(tides, currentHeight, isRising, h, sunriseStr, sunsetStr);
}

// Harmonic fallback if API is unavailable
function simulateTideData() {
  window._dataSource = 'fallback';
  // Seed from known Reykjavik tidal pattern — roughly correct, advances ~50 min/day
  const now = new Date();
  const h = now.getHours() + now.getMinutes() / 60;

  // Days since March 25 2026 reference
  const ref = new Date('2026-03-25T00:00:00');
  const daysDiff = (now - ref) / 86400000;
  // Reykjavik tides advance ~50 min per day
  const shift = (daysDiff * 50 / 60); // hours

  function shiftTime(baseH) {
    return ((baseH + shift) % 24 + 24) % 24;
  }
  function formatShifted(baseH) {
    const shifted = shiftTime(baseH);
    return formatTime12(shifted);
  }

  const baseTides = [
    { type: 'low',  baseH: 4.85,  heightM: 1.12 },
    { type: 'high', baseH: 11.07, heightM: 3.18 },
    { type: 'low',  baseH: 17.13, heightM: 1.12 },
    { type: 'high', baseH: 23.63, heightM: 3.18 },
  ];

  const tides = baseTides.map(t => ({
    ...t,
    timeH: shiftTime(t.baseH),
    time: formatTime12(shiftTime(t.baseH))
  })).sort((a,b) => a.timeH - b.timeH);

  function interpolate(t) {
    let prev = tides[tides.length - 1];
    let next = tides[0];
    for (let i = 0; i < tides.length; i++) {
      if (tides[i].timeH <= t) prev = tides[i];
      if (tides[i].timeH > t && next === tides[0]) next = tides[i];
    }
    if (prev.timeH > next.timeH) {
      const span = (24 - prev.timeH) + next.timeH;
      const elapsed = (t - prev.timeH + 24) % 24;
      const frac = elapsed / span;
      return prev.heightM + (next.heightM - prev.heightM) * (1 - Math.cos(frac * Math.PI)) / 2;
    }
    const span = next.timeH - prev.timeH;
    const elapsed = t - prev.timeH;
    const frac = span > 0 ? elapsed / span : 0;
    return prev.heightM + (next.heightM - prev.heightM) * (1 - Math.cos(frac * Math.PI)) / 2;
  }

  const currentHeight = Math.max(0, interpolate(h));
  const isRising = interpolate(h) > interpolate(h - 0.1);

  renderUI(tides, currentHeight, isRising, h, '—', '—');
}

// Shared render function used by both live and fallback
function renderUI(tides, currentHeight, isRising, h, sunriseStr, sunsetStr) {
  const now = new Date();
  window._currentTides = tides; // store for notification scheduler
  if (localStorage.getItem('floki_notif') === 'on' && Notification.permission === 'granted') {
    document.getElementById('notifToggle').checked = true;
    scheduleNotifications();
  }

  // Find next high and low
  let nextHigh = null, nextLow = null;
  for (const t of tides) {
    if (t.timeH > h) {
      if (!nextHigh && t.type === 'high') nextHigh = t;
      if (!nextLow && t.type === 'low') nextLow = t;
    }
  }
  if (!nextHigh) nextHigh = tides.find(t => t.type === 'high');
  if (!nextLow) nextLow = tides.find(t => t.type === 'low');

  const nextHighMins = nextHigh ? (nextHigh.timeH - h) * 60 : 999;

  // Verdict
  const v = getTideVerdict(currentHeight, isRising, nextHigh?.heightM || 0, nextHighMins);

  // Update UI
  const card = document.getElementById('verdictCard');
  card.className = `verdict-card ${v.status}`;
  document.getElementById('verdictEmoji').textContent = v.emoji;
  document.getElementById('verdictTitle').textContent = v.title;
  document.getElementById('verdictDesc').textContent = v.desc;

  // Water level fill (0–100%)
  const pct = Math.min(100, Math.max(4, (currentHeight / TIDE_MAX_REYKJAVIK) * 100));
  const fillEl = document.getElementById('waterFill');
  fillEl.style.height = pct + '%';
  // Color: blue when low, deeper blue when high
  const blueVal = Math.round(80 + pct * 0.4);
  fillEl.style.background = `rgba(30, ${blueVal}, 180, 0.5)`;

  document.getElementById('waterDir').textContent = isRising ? '↗ HÆKKANDI' : '↘ LÆKKANDI';

  // Countdown to next tide change
  const eventsAhead = tides.filter(t => t.timeH > h);
  const nextEvent = eventsAhead.length > 0 ? eventsAhead[0] : tides[0];
  const nextEventMins = Math.max(0, (nextEvent.timeH - h) * 60);
  const hrs = Math.floor(nextEventMins / 60);
  const mins = Math.round(nextEventMins % 60);
  const timeStr = hrs > 0 ? `${hrs}h ${mins}m` : `${mins} min`;
  const isNextHigh = nextEvent.type === 'high';

  document.getElementById('countdownIcon').textContent = isNextHigh ? '🌊' : '🏖️';
  document.getElementById('countdownTime').textContent = timeStr;
  document.getElementById('countdownLabel').textContent = isNextHigh ? 'þar til flóð' : 'þar til fjara';

  // Show what comes after
  const afterEvents = eventsAhead.slice(1);
  const afterEvent = afterEvents.length > 0 ? afterEvents[0] : null;
  if (afterEvent) {
    const afterMins = Math.max(0, (afterEvent.timeH - h) * 60);
    const aHrs = Math.floor(afterMins / 60);
    const aMins = Math.round(afterMins % 60);
    const afterTimeStr = aHrs > 0 ? `${aHrs}h ${aMins}m` : `${aMins} min`;
    const afterLabel = afterEvent.type === 'high' ? '🌊 flóð' : '🏖️ fjara';
    document.getElementById('countdownAfter').textContent = `Svo ${afterLabel} eftir ${afterTimeStr}`;
  }

  // Info tiles
  if (nextHigh) {
    document.getElementById('nextHighVal').textContent = nextHigh.time;
    document.getElementById('nextHighHeight').textContent = nextHigh.heightM.toFixed(2) + 'm';
  }
  if (nextLow) {
    document.getElementById('nextLowVal').textContent = nextLow.time;
    document.getElementById('nextLowHeight').textContent = nextLow.heightM.toFixed(2) + 'm';
  }

  // Timeline
  const timelineEl = document.getElementById('timeline');
  timelineEl.innerHTML = '';

  // Add "Now" marker and all tides
  const allEvents = [];
  allEvents.push({ type: 'current', time: formatTime12(h), timeH: h, heightM: currentHeight });
  tides.forEach(t => allEvents.push(t));
  allEvents.sort((a, b) => a.timeH - b.timeH);

  allEvents.forEach(event => {
    const badge = getBeachBadge(event.heightM);
    const isCurrent = event.type === 'current';
    const isHigh = event.type === 'high';
    const dotClass = isCurrent ? 'current' : isHigh ? 'high' : 'low';
    const emoji = isCurrent ? '📍' : isHigh ? '🌊' : '🏖️';
    const label = isCurrent ? 'Núna' : isHigh ? 'Flóð' : 'Fjara';
    const isPast = !isCurrent && event.timeH < h;

    const item = document.createElement('div');
    item.className = 'timeline-item';
    item.style.opacity = isPast ? '0.45' : '1';
    item.innerHTML = `
      <div class="timeline-dot ${dotClass}">${emoji}</div>
      <div class="timeline-info">
        <div class="t-time">${event.time}</div>
        <div class="t-label">${label}</div>
        <span class="t-beach ${badge.cls}">${badge.label}</span>
      </div>
      <div class="timeline-height">${event.heightM.toFixed(2)}m</div>
    `;
    timelineEl.appendChild(item);
  });

  // Register low tides for notifications
  setLowTidesForNotif(tides);

  // Last updated
  const nowStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  const src = window._dataSource || 'fallback';
  const dot = src === 'live' ? '🟢 Live data' : '🟡 Estimated';
  document.getElementById('lastUpdated').textContent = (location.protocol === 'file:' ? 'Áætlað · ' : 'Í beinni · ') + 'Uppfært ' + nowStr;
}

function formatTime12(h) {
  const totalMin = Math.round(h * 60);
  const hh = Math.floor(totalMin / 60) % 24;
  const mm = totalMin % 60;
  const ampm = hh >= 12 ? 'PM' : 'AM';
  const displayH = hh % 12 || 12;
  return `${displayH}:${mm.toString().padStart(2,'0')} ${ampm}`;
}

// Run on load
fetchTideData();

// Auto-refresh every 10 minutes
setInterval(fetchTideData, 10 * 60 * 1000);

// ── Notification System ──
// Works on iPhone when app is "Add to Home Screen" (iOS 16.4+)







function updateNotifUI() {
  const perm = (typeof Notification !== 'undefined') ? Notification.permission : 'unsupported';
  const statusEl = document.getElementById('notifStatus');
  const btnEl    = document.getElementById('notifBtn');
  const tipEl    = document.getElementById('notifTip');
  const descEl   = document.getElementById('notifDesc');

  if (typeof Notification === 'undefined') {
    statusEl.textContent = 'Not supported';
    statusEl.className = 'notif-status denied';
    btnEl.disabled = true;
    tipEl.style.display = 'block';
    tipEl.innerHTML = '📱 <strong>iPhone tip:</strong> Opnaðu þessa síðu í vafra, ýttu á Deila → <strong>Bæta við heimaskjá</strong>, opnaðu þaðan. Tilkynningar þurfa iOS 16.4+ og app á heimaskjá.';
    return;
  }

  if (perm === 'granted') {
    statusEl.textContent = 'On ✓';
    statusEl.className = 'notif-status granted';
    btnEl.textContent = '✅ Viðvaranir stilltar!';
    btnEl.style.background = 'linear-gradient(135deg, #1a6b3c, #27ae60)';
    btnEl.disabled = false;
    descEl.textContent = "Þú færð tilkynningu 30 mín fyrir hverja fjöru í dag. 🐾";
    tipEl.style.display = 'none';
    renderNotifTimes();
  } else if (perm === 'denied') {
    statusEl.textContent = 'Blocked';
    statusEl.className = 'notif-status denied';
    btnEl.disabled = true;
    btnEl.textContent = '🚫 Lokað — sjá ábendingu';
    tipEl.style.display = 'block';
    tipEl.innerHTML = '📱 Til að laga á iPhone: <strong>Settings → Apps → Safari → Notifications</strong> → allow this site, then refresh.';
  } else {
    statusEl.textContent = 'Off';
    statusEl.className = 'notif-status default';
    btnEl.disabled = false;
    btnEl.textContent = '🔔 Tilkynna mér þegar er fjara';
    btnEl.style.background = '';
    tipEl.style.display = 'block';
    tipEl.innerHTML = '📱 <strong>iPhone:</strong> First add to Home Screen (Share → Add to Home Screen), open from there, then tap the button above.';
  }
}

function renderNotifTimes() {
  const el = document.getElementById('notifTimes');
  if (!el) return;
  el.innerHTML = '';
  lowTideTimesForNotif.forEach(t => {
    const notifTime = new Date(t.date.getTime() - 30 * 60000);
    const notifStr  = notifTime.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const row = document.createElement('div');
    row.className = 'notif-time-row';
    row.innerHTML = `
      <span class="notif-time-label">🏖️ Fjara kl. ${t.timeStr}</span>
      <span class="notif-time-val">Viðvörun kl. ${notifStr}</span>
    `;
    el.appendChild(row);
  });
}

async function requestNotifications() {
  if (typeof Notification === 'undefined') { updateNotifUI(); return; }
  const perm = await Notification.requestPermission();
  updateNotifUI();
  if (perm === 'granted') scheduleNotifications();
}

function scheduleNotifications() {
  scheduledNotifIds.forEach(id => clearTimeout(id));
  scheduledNotifIds = [];
  if (!lowTideTimesForNotif.length) return;
  const now = new Date();
  lowTideTimesForNotif.forEach(t => {
    const notifTime = new Date(t.date.getTime() - 30 * 60000);
    const msUntil = notifTime - now;
    if (msUntil < 0) return;
    const id = setTimeout(() => {
      new Notification("🏖️ Tími fyrir strandferð!", {
        body: `Fjara kl. ${t.timeStr} — taktu taumin! 🐾`,
        tag: 'strandferð-' + t.timeStr,
        requireInteraction: true
      });
    }, msUntil);
    scheduledNotifIds.push(id);
  });
  renderNotifTimes();
}

function setLowTidesForNotif(tides) {
  const today = new Date();
  lowTideTimesForNotif = tides
    .filter(t => t.type === 'low')
    .map(t => {
      const d = new Date(today);
      d.setHours(Math.floor(t.timeH), Math.round((t.timeH % 1) * 60), 0, 0);
      return { date: d, timeStr: t.time };
    })
    .filter(t => t.date > new Date());
  if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
    scheduleNotifications();
  }
  updateNotifUI();
}

// Init
updateNotifUI();
